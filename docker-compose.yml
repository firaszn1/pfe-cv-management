services:
  backend:
    build:
      context: ./cv-filter-back/cvfilterback
    container_name: cv-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MONGODB_URI: mongodb://mongodb:27017/cvdb
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/cv-realm
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      ALFRESCO_BASE_URL: http://alfresco:8080
      ALFRESCO_USERNAME: admin
      ALFRESCO_PASSWORD: admin
      ALFRESCO_FOLDER_ID: -shared-
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
      - keycloak
      - alfresco

  frontend:
    build:
      context: ./cv-filter-front
    container_name: cv-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  kc-postgres:
    image: postgres:16
    container_name: kc-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    volumes:
      - kc_postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    container_name: keycloak
    command:
      - start-dev
      - --db=postgres
      - --db-url-host=kc-postgres
      - --db-url-database=keycloak
      - --db-username=keycloak
      - --db-password=keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    depends_on:
      - kc-postgres
    volumes:
      - ./keycloak/themes:/opt/keycloak/themes

  mongodb:
    image: mongodb/mongodb-community-server:8.0-ubuntu2204
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  alfresco-postgres:
    image: postgres:16
    container_name: alfresco-postgres
    environment:
      POSTGRES_DB: alfresco
      POSTGRES_USER: alfresco
      POSTGRES_PASSWORD: alfresco
    volumes:
      - alfresco_postgres_data:/var/lib/postgresql/data

  alfresco:
    image: alfresco/alfresco-content-repository-community:23.4.0
    container_name: alfresco
    environment:
      JAVA_OPTS: >-
        -Ddb.driver=org.postgresql.Driver
        -Ddb.username=alfresco
        -Ddb.password=alfresco
        -Ddb.url=jdbc:postgresql://alfresco-postgres:5432/alfresco
        -Dauthentication.chain=alfrescoNtlm1:alfrescoNtlm
        -Dcsrf.filter.enabled=false
        -Dlocal.transform.service.enabled=false
        -Dlegacy.transform.service.enabled=false
        -Dmessaging.subsystem.autoStart=false
        -Dindex.subsystem.name=noindex
    ports:
      - "8082:8080"
    depends_on:
      - alfresco-postgres
    volumes:
      - alfresco_data:/usr/local/tomcat/alf_data

volumes:
  kc_postgres_data:
  mongo_data:
  alfresco_postgres_data:
  alfresco_data:
